<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://xmlns.jcp.org/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

<ui:composition template="/templates/template-barra-navegacao.xhtml" >
	<ui:define name="conteudo" >
		<h:form id="cltform">
			<p:toolbar>
				<f:facet name="left">
					<h:outputText value="Cadastrando novo cliente" />
				</f:facet>
			</p:toolbar>
			
			<p:separator/>
			<h:panelGrid id="cltgrid" columns="2" cellspacing="5" cellpadding="4">
				<p:outputLabel for="nome" value="Nome:" />
				<p:inputText id="nome" maxlength="50" size="50" value="#{clienteBean.novoCliente.nome}"/>
				<p:outputLabel for="endereco" value="Endereço:" />
				<p:inputText id="endereco" maxlength="200" size="50" value="#{clienteBean.novoCliente.endereco}"/>
				<p:outputLabel for="email" value="E-mail:" />
				<p:inputText id="email" maxlength="30" size="50" value="#{clienteBean.novoCliente.email}"/>
				<p:outputLabel for="cpf" value="CPF:" />
				<p:inputMask id="cpf" maxlength="11" size="20" mask="999.999.999-99" value="#{clienteBean.novoCliente.cpf}"/>
				<p:outputLabel for="dataNascimento" value="Data de Nascimento:" />
				<p:calendar id="dataNascimento" locale="br" navigator="true" pattern="dd/MM/yyyy" yearRange="c-100:c" mask="true" value="#{clienteBean.novoCliente.dataNascimento}"/>
				<p:commandButton value="Voltar" action="/index.xhtml?faces-redirect=true"/>
				<p:commandButton id="confirmar" value="Cadastrar" actionListener="#{clienteBean.cadastrar}" update=":mensagem "/>
			</h:panelGrid>
		</h:form>
	</ui:define>
</ui:composition>
</html>
